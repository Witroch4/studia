services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: studia-backend
    ports:
      - "8000:8000"
    networks:
      - studia-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./fontend
      target: production
    container_name: studia-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - studia-net
    restart: unless-stopped

networks:
  studia-net:
    driver: bridge
