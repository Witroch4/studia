# studIA — stack de produção (Docker Swarm, deploy direto via SSH, sem Portainer).
# Infra compartilhada na overlay externa `minha_rede`: postgres, redis e minio
# já rodam lá (stacks postgres/redis/minio). studIA sobe backend + worker +
# scraper + meili (dedicado) + frontend, todos fixados no manager1 (x86,
# co-localizado com postgres/minio/redis; meili tem volume local).
#
# Roteamento (Traefik, dom único studia.witdev.com.br, por prioridade):
#   /api/auth/*  → frontend (Better Auth, Next route handler)   prio 100
#   /api/*       → backend  (FastAPI)                            prio 50
#   resto        → frontend (Next app)                           prio 1
#
# Imagens: ${REGISTRY:-witrocha}/studia-{backend,frontend,scraper}:${TAG:-latest}
# Env produtivo (secrets) montado de /opt/studia/.env (montado pelo build.sh).

x-studia-backend-image: &backend-image "${REGISTRY:-witrocha}/studia-backend:${BACKEND_TAG:-latest}"
x-studia-frontend-image: &frontend-image "${REGISTRY:-witrocha}/studia-frontend:${FRONTEND_TAG:-latest}"
x-studia-scraper-image: &scraper-image "${REGISTRY:-witrocha}/studia-scraper:${SCRAPER_TAG:-latest}"

x-on-manager: &on-manager
  placement:
    constraints:
      - node.hostname == manager1
  restart_policy:
    condition: any
    delay: 5s
  update_config:
    order: start-first
    parallelism: 1
    delay: 5s
  rollback_config:
    order: stop-first
    parallelism: 1

services:
  backend:
    image: *backend-image
    hostname: studia-backend
    env_file:
      - ${STUDIA_ENV_FILE:-/opt/studia/.env}
    environment:
      REDIS_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MEILI_URL: http://studia-meili:7700
      SCRAPER_URL: http://studia-scraper:8090
      TZ: America/Fortaleza
    # Auto-cura: roda migrações ANTES de servir. Em qualquer deploy/restart
    # (build.sh, Portainer, scale, docker service update), o backend leva o
    # schema ao dia (migrate + verify) e só então sobe o uvicorn. Se o schema
    # não puder bater com os models, db_prepare sai 1 e o container reinicia —
    # falha visível, nunca 500 silencioso em produção.
    command: sh -c "python -m scripts.db_prepare && exec uvicorn main:app --host 0.0.0.0 --port 8000"
    networks:
      - minha_rede
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    deploy:
      <<: *on-manager
      labels:
        traefik.enable: "true"
        traefik.docker.network: minha_rede
        traefik.http.routers.studia-api.rule: "Host(`studia.witdev.com.br`) && PathPrefix(`/api`)"
        traefik.http.routers.studia-api.priority: "50"
        traefik.http.routers.studia-api.entrypoints: websecure
        traefik.http.routers.studia-api.tls.certresolver: letsencryptresolver
        traefik.http.services.studia-api.loadbalancer.server.port: "8000"

  worker:
    image: *backend-image
    env_file:
      - ${STUDIA_ENV_FILE:-/opt/studia/.env}
    environment:
      MINIO_ENDPOINT: minio:9000
      MEILI_URL: http://studia-meili:7700
      SCRAPER_URL: http://studia-scraper:8090
      PYTHONDONTWRITEBYTECODE: "1"
      TZ: America/Fortaleza
      NATS_SERVERS: nats://nats:4222
      TASKIQ_RESULT_REDIS_URL: redis://redis:6379/2
      TASKIQ_STUDIA_BACKEND_MAX_ACK_PENDING: "1"
      TASKIQ_STUDIA_BACKEND_ACK_WAIT_SECONDS: "3600"
    command: taskiq worker worker:broker
    # O worker não serve HTTP; desabilita o HEALTHCHECK HTTP herdado da imagem
    # (Dockerfile estágio production) que causava unhealthy → crash-loop (0/1).
    healthcheck:
      test: ["NONE"]
    networks:
      - minha_rede
    deploy:
      <<: *on-manager

  studia-scraper:
    image: *scraper-image
    env_file:
      - ${STUDIA_ENV_FILE:-/opt/studia/.env}
    environment:
      NATS_SERVERS: nats://nats:4222
      TASKIQ_RESULT_REDIS_URL: redis://redis:6379/2
      TASKIQ_IDEMPOTENCY_REDIS_URL: redis://redis:6379/2
      TC_STORAGE_STATE_PATH: /state/storage_state.json
      SCRAPE_STATE_PATH: /state/scrape_state.db
      DISCOVERY_DUMP_DIR: /state/discovery
      TZ: America/Fortaleza
    command: python -m app.main api-serve --host 0.0.0.0 --port 8090
    networks:
      - minha_rede
    volumes:
      - studia_scraper_state:/state
    deploy:
      replicas: 1
      <<: *on-manager

  studia-scraper-worker-default:
    image: *scraper-image
    env_file:
      - ${STUDIA_ENV_FILE:-/opt/studia/.env}
    environment:
      NATS_SERVERS: nats://nats:4222
      TASKIQ_RESULT_REDIS_URL: redis://redis:6379/2
      TASKIQ_IDEMPOTENCY_REDIS_URL: redis://redis:6379/2
      TASKIQ_STUDIA_DEFAULT_MAX_ACK_PENDING: "1"
      TASKIQ_STUDIA_ACK_WAIT_SECONDS: "600"
      TASKIQ_STUDIA_REQUEUE_STALE_SECONDS: "120"
      TC_STORAGE_STATE_PATH: /state/storage_state.json
      SCRAPE_STATE_PATH: /state/scrape_state.db
      DISCOVERY_DUMP_DIR: /state/discovery
      TZ: America/Fortaleza
    command: taskiq worker app.tasks.brokers.studia:broker_studia_default --workers 1 --fs-discover --tasks-pattern 'app/tasks/**/*.py'
    stop_grace_period: 10m
    networks:
      - minha_rede
    volumes:
      - studia_scraper_state:/state
    deploy:
      <<: *on-manager
      update_config:
        order: stop-first
        parallelism: 1
        delay: 5s
      rollback_config:
        order: stop-first
        parallelism: 1

  studia-scraper-worker-low:
    image: *scraper-image
    env_file:
      - ${STUDIA_ENV_FILE:-/opt/studia/.env}
    environment:
      NATS_SERVERS: nats://nats:4222
      TASKIQ_RESULT_REDIS_URL: redis://redis:6379/2
      TASKIQ_IDEMPOTENCY_REDIS_URL: redis://redis:6379/2
      TASKIQ_STUDIA_ACK_WAIT_SECONDS: "600"
      TASKIQ_STUDIA_REQUEUE_STALE_SECONDS: "120"
      TASKIQ_STUDIA_LOW_PULL_BATCH: "1"
      TASKIQ_STUDIA_LOW_MAX_ACK_PENDING: "5"
      TC_STORAGE_STATE_PATH: /state/storage_state.json
      SCRAPE_STATE_PATH: /state/scrape_state.db
      DISCOVERY_DUMP_DIR: /state/discovery
      TZ: America/Fortaleza
    command: taskiq worker app.tasks.brokers.studia:broker_studia_low --workers 1 --fs-discover --tasks-pattern 'app/tasks/**/*.py'
    stop_grace_period: 10m
    networks:
      - minha_rede
    volumes:
      - studia_scraper_state:/state
    deploy:
      <<: *on-manager
      replicas: 3
      update_config:
        order: stop-first
        parallelism: 1
        delay: 5s
      rollback_config:
        order: stop-first
        parallelism: 1

  studia-scraper-supervisor:
    image: *scraper-image
    env_file:
      - ${STUDIA_ENV_FILE:-/opt/studia/.env}
    environment:
      NATS_SERVERS: nats://nats:4222
      TASKIQ_RESULT_REDIS_URL: redis://redis:6379/2
      TASKIQ_IDEMPOTENCY_REDIS_URL: redis://redis:6379/2
      TASKIQ_STUDIA_DEFAULT_MAX_ACK_PENDING: "1"
      TASKIQ_STUDIA_ACK_WAIT_SECONDS: "600"
      TASKIQ_STUDIA_REQUEUE_STALE_SECONDS: "120"
      TC_STORAGE_STATE_PATH: /state/storage_state.json
      SCRAPE_STATE_PATH: /state/scrape_state.db
      DISCOVERY_DUMP_DIR: /state/discovery
      TZ: America/Fortaleza
    command: python -m app.main queue-supervisor --interval 60 --image-limit 5 --image-discovery-interval 600
    stop_grace_period: 30s
    networks:
      - minha_rede
    volumes:
      - studia_scraper_state:/state
    deploy:
      <<: *on-manager

  studia-meili:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      TZ: America/Fortaleza
    networks:
      - minha_rede
    volumes:
      - studia_meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    deploy:
      <<: *on-manager

  frontend:
    image: *frontend-image
    env_file:
      - ${STUDIA_ENV_FILE:-/opt/studia/.env}
    environment:
      BETTER_AUTH_URL: https://studia.witdev.com.br
      NEXT_PUBLIC_API_URL: https://studia.witdev.com.br
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      TZ: America/Fortaleza
    networks:
      - minha_rede
    depends_on:
      - backend
    healthcheck:
      # 127.0.0.1 (não 'localhost'): no Alpine localhost resolve ::1 (IPv6)
      # primeiro, mas o server Next escuta em 0.0.0.0 (IPv4) → connection refused.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    deploy:
      <<: *on-manager
      labels:
        traefik.enable: "true"
        traefik.docker.network: minha_rede
        # Better Auth (Next) — /api/auth fica no frontend, prioridade maior que /api.
        traefik.http.routers.studia-auth.rule: "Host(`studia.witdev.com.br`) && PathPrefix(`/api/auth`)"
        traefik.http.routers.studia-auth.priority: "100"
        traefik.http.routers.studia-auth.entrypoints: websecure
        traefik.http.routers.studia-auth.tls.certresolver: letsencryptresolver
        traefik.http.routers.studia-auth.service: studia-web
        # App Next (catch-all).
        traefik.http.routers.studia-web.rule: "Host(`studia.witdev.com.br`)"
        traefik.http.routers.studia-web.priority: "1"
        traefik.http.routers.studia-web.entrypoints: websecure
        traefik.http.routers.studia-web.tls.certresolver: letsencryptresolver
        traefik.http.services.studia-web.loadbalancer.server.port: "3000"

volumes:
  studia_meili_data:
  studia_scraper_state:
    external: true
    name: tc-scraper_tc_scraper_state

networks:
  minha_rede:
    external: true
    name: minha_rede
