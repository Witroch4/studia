services:
  backend:
    build:
      context: ./backend
      target: deps
    container_name: studia-backend-dev
    ports:
      - "8011:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/studia
      - REDIS_URL=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=witalo
      - MINIO_SECRET_KEY=g3IoVa0N51NjPGaMnbYsMhNdcrUX7UxUegOmCCre
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SCRAPER_URL=http://studia-scraper-dev:8090
      - MEILI_URL=http://meili:7700
      - MEILI_KEY=dev_master_key_studia_2026
      # Dev roda em HTTP (localhost) → cookie de sessão NÃO pode ser Secure,
      # senão o browser descarta o JWT/CSRF do handoff. Em prod (HTTPS via
      # Traefik) o default é Secure=true.
      - STUDIA_COOKIE_SECURE=false
      - NATS_SERVERS=${NATS_SERVERS:-nats://platform-nats:4222}
      - TASKIQ_RESULT_REDIS_URL=redis://redis:6379/2
    networks:
      - shared
      - studia-net

  worker:
    build:
      context: ./backend
      target: deps
    container_name: studia-worker-dev
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: taskiq worker worker:broker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/studia
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=witalo
      - MINIO_SECRET_KEY=g3IoVa0N51NjPGaMnbYsMhNdcrUX7UxUegOmCCre
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PYTHONDONTWRITEBYTECODE=1
      - SCRAPER_URL=http://studia-scraper-dev:8090
      - MEILI_URL=http://meili:7700
      - MEILI_KEY=dev_master_key_studia_2026
      # Dev roda em HTTP (localhost) → cookie de sessão NÃO pode ser Secure,
      # senão o browser descarta o JWT/CSRF do handoff. Em prod (HTTPS via
      # Traefik) o default é Secure=true.
      - STUDIA_COOKIE_SECURE=false
      - NATS_SERVERS=${NATS_SERVERS:-nats://platform-nats:4222}
      - TASKIQ_RESULT_REDIS_URL=redis://redis:6379/2
      - TASKIQ_STUDIA_BACKEND_MAX_ACK_PENDING=1
      - TASKIQ_STUDIA_BACKEND_ACK_WAIT_SECONDS=3600
    networks:
      - shared
      - studia-net

  guia-supervisor:
    build:
      context: ./backend
      target: deps
    container_name: studia-guia-supervisor-dev
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: python -m scripts.guia_supervisor
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/studia
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=witalo
      - MINIO_SECRET_KEY=g3IoVa0N51NjPGaMnbYsMhNdcrUX7UxUegOmCCre
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PYTHONDONTWRITEBYTECODE=1
      - SCRAPER_URL=http://studia-scraper-dev:8090
      - MEILI_URL=http://meili:7700
      - MEILI_KEY=dev_master_key_studia_2026
      - STUDIA_COOKIE_SECURE=false
      - NATS_SERVERS=${NATS_SERVERS:-nats://platform-nats:4222}
      - TASKIQ_RESULT_REDIS_URL=redis://redis:6379/2
      - GUIA_COOLDOWN_SECONDS=900
      - GUIA_SUPERVISOR_INTERVAL=30
      - GUIA_MAX_COLETA_SECONDS=21600
      - GUIA_RESOLVE_MAX_TENTATIVAS=3
    networks:
      - shared
      - studia-net

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: studia-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=witalo
      - MINIO_ROOT_PASSWORD=g3IoVa0N51NjPGaMnbYsMhNdcrUX7UxUegOmCCre
    command: server /data --console-address ":9001" --quiet
    networks:
      - studia-net

  meili:
    image: getmeili/meilisearch:v1.11
    container_name: studia-meili-dev
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    environment:
      - MEILI_MASTER_KEY=dev_master_key_studia_2026
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    networks:
      - studia-net

  scraper:
    build:
      context: ./services/scraper
    container_name: studia-scraper-dev
    ports:
      - "8090:8090"
    volumes:
      - ./services/scraper:/app
      - ./backend:/backend:ro
      - scraper_state:/state
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/studia
      - TC_BASE=https://www.tecconcursos.com.br
      - TC_EMAIL=${TC_EMAIL:-}
      - TC_PASSWORD=${TC_PASSWORD:-}
      - TC_STORAGE_STATE_PATH=/state/storage_state.json
      - SCRAPE_STATE_PATH=/state/scrape_state.db
      - DISCOVERY_DUMP_DIR=/state/discovery
      - NATS_SERVERS=${NATS_SERVERS:-nats://platform-nats:4222}
      - TASKIQ_RESULT_REDIS_URL=redis://redis:6379/2
      - TASKIQ_IDEMPOTENCY_REDIS_URL=redis://redis:6379/2
    networks:
      - shared

  scraper-worker-default:
    build:
      context: ./services/scraper
    container_name: studia-scraper-worker-default-dev
    volumes:
      - ./services/scraper:/app
      - ./backend:/backend:ro
      - scraper_state:/state
    command: taskiq worker app.tasks.brokers.studia:broker_studia_default --workers 1 --fs-discover --tasks-pattern 'app/tasks/**/*.py'
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/studia
      - TC_BASE=https://www.tecconcursos.com.br
      - TC_EMAIL=${TC_EMAIL:-}
      - TC_PASSWORD=${TC_PASSWORD:-}
      - TC_STORAGE_STATE_PATH=/state/storage_state.json
      - SCRAPE_STATE_PATH=/state/scrape_state.db
      - DISCOVERY_DUMP_DIR=/state/discovery
      - NATS_SERVERS=${NATS_SERVERS:-nats://platform-nats:4222}
      - TASKIQ_RESULT_REDIS_URL=redis://redis:6379/2
      - TASKIQ_IDEMPOTENCY_REDIS_URL=redis://redis:6379/2
    networks:
      - shared
      - studia-net

  scraper-worker-low:
    build:
      context: ./services/scraper
    container_name: studia-scraper-worker-low-dev
    volumes:
      - ./services/scraper:/app
      - ./backend:/backend:ro
      - scraper_state:/state
    command: taskiq worker app.tasks.brokers.studia:broker_studia_low --workers 5 --fs-discover --tasks-pattern 'app/tasks/**/*.py'
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/studia
      - TC_BASE=https://www.tecconcursos.com.br
      - TC_EMAIL=${TC_EMAIL:-}
      - TC_PASSWORD=${TC_PASSWORD:-}
      - TC_STORAGE_STATE_PATH=/state/storage_state.json
      - SCRAPE_STATE_PATH=/state/scrape_state.db
      - DISCOVERY_DUMP_DIR=/state/discovery
      - NATS_SERVERS=${NATS_SERVERS:-nats://platform-nats:4222}
      - TASKIQ_RESULT_REDIS_URL=redis://redis:6379/2
      - TASKIQ_IDEMPOTENCY_REDIS_URL=redis://redis:6379/2
    networks:
      - shared
      - studia-net

  frontend:
    image: node:24-alpine
    container_name: studia-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./fontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8011
      - NEXT_TELEMETRY_DISABLED=1
      # Better Auth (sessão em cookie, tabelas no mesmo Postgres do studIA)
      - BETTER_AUTH_URL=http://localhost:3000
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-studia-dev-better-auth-secret-change-in-prod-0001}
      - AUTH_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/studia
      # Login com Google (Better Auth) — vêm do .env local. NEXT_PUBLIC_GOOGLE_AUTH=1
      # faz o botão aparecer no /login e /cadastro.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXT_PUBLIC_GOOGLE_AUTH=${NEXT_PUBLIC_GOOGLE_AUTH:-}
      # SMTP transacional (confirmação de e-mail + reset de senha). Vazio em dev
      # → mailer cai no modo "console" (loga o link no terminal em vez de enviar).
      - SMTP_ADDRESS=${SMTP_ADDRESS:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - MAILER_SENDER_EMAIL=${MAILER_SENDER_EMAIL:-}
    depends_on:
      - backend
    networks:
      - studia-net
      - shared

volumes:
  minio_data:
  scraper_state:
  meili_data:

networks:
  studia-net:
    driver: bridge
  shared:
    external: true
    name: minha_rede
